name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            bundle_subdir: aarch64-apple-darwin/release/bundle
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            bundle_subdir: release/bundle

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Gene App ${{ github.ref_name }}'
          releaseBody: '详见提交记录。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Keep updater JSON enabled so Tauri actually produces the .sig /
          # .app.tar.gz / .nsis.zip artifacts on disk. tauri-action will then
          # emit "Signature not found for the updater JSON. Skipping upload..."
          # (because a single matrix job only sees its own platform's sig) —
          # that's expected; the explicit upload steps and the finalize job
          # below pick up what it skips.
          includeUpdaterJson: true

      - name: Upload macOS updater signature
        if: matrix.platform == 'macos-14'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          cd "src-tauri/target/${{ matrix.bundle_subdir }}/macos"
          ls -la
          gh release upload "$TAG" "Gene App.app.tar.gz.sig" --clobber

      - name: Upload Windows updater assets
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          cd "src-tauri/target/${{ matrix.bundle_subdir }}/nsis"
          ls -la
          VERSION="${TAG#v}"
          gh release upload "$TAG" \
            "Gene App_${VERSION}_x64-setup.exe.sig" \
            "Gene App_${VERSION}_x64-setup.nsis.zip" \
            "Gene App_${VERSION}_x64-setup.nsis.zip.sig" \
            --clobber

  finalize:
    name: Compose latest.json
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir /tmp/sigs
          echo "=== Downloaded signatures ==="
          ls -la /tmp/sigs/

          MAC_SIG_FILE="/tmp/sigs/Gene.App.app.tar.gz.sig"
          WIN_SIG_FILE="/tmp/sigs/Gene.App_${VERSION}_x64-setup.nsis.zip.sig"

          if [[ ! -f "$MAC_SIG_FILE" ]]; then
            echo "ERROR: macOS updater signature not found at $MAC_SIG_FILE" >&2
            exit 1
          fi
          if [[ ! -f "$WIN_SIG_FILE" ]]; then
            echo "ERROR: Windows updater signature not found at $WIN_SIG_FILE" >&2
            exit 1
          fi

          MAC_SIG=$(cat "$MAC_SIG_FILE")
          WIN_SIG=$(cat "$WIN_SIG_FILE")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_sig "$MAC_SIG" \
            --arg win_sig "$WIN_SIG" \
            --arg repo "$REPO" \
            --arg tag "$TAG" \
            --arg version_bare "$VERSION" \
            '{
              version: $version,
              notes: "Gene App \($version)",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $mac_sig,
                  url: "https://github.com/\($repo)/releases/download/\($tag)/Gene.App_aarch64.app.tar.gz"
                },
                "windows-x86_64": {
                  signature: $win_sig,
                  url: "https://github.com/\($repo)/releases/download/\($tag)/Gene.App_\($version_bare)_x64-setup.nsis.zip"
                }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json
          gh release upload "$TAG" latest.json --clobber
