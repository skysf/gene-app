name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --title "Gene App $TAG" \
              --notes "详见提交记录。" \
              --repo "$REPO"
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with Tauri CLI
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      - name: Rename macOS updater bundle for asset consistency
        if: matrix.platform == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          cd "src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          mv "Gene App.app.tar.gz" "Gene App_aarch64.app.tar.gz"
          mv "Gene App.app.tar.gz.sig" "Gene App_aarch64.app.tar.gz.sig"

      - name: List produced bundle files (diagnostic)
        shell: bash
        run: |
          echo "=== Bundle tree ==="
          find src-tauri/target -path '*/release/bundle/*' -type f 2>/dev/null | sort

      - name: Upload release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          find src-tauri/target \
            -path '*/release/bundle/*' \
            -type f \
            ! -path '*/msi/*' \
            \( -name '*.dmg' -o -name '*-setup.exe' -o -name '*.app.tar.gz' -o -name '*.nsis.zip' -o -name '*.sig' \) \
            -exec sh -c 'echo "Uploading: $1"; gh release upload "$TAG" "$1" --clobber --repo "$REPO"' _ {} \;

  finalize:
    name: Compose latest.json
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir /tmp/sigs
          echo "=== Downloaded signatures ==="
          ls -la /tmp/sigs/

          MAC_SIG_FILE="/tmp/sigs/Gene.App_aarch64.app.tar.gz.sig"
          WIN_SIG_FILE="/tmp/sigs/Gene.App_${VERSION}_x64-setup.nsis.zip.sig"

          [[ -f "$MAC_SIG_FILE" ]] || { echo "ERROR: missing $MAC_SIG_FILE" >&2; exit 1; }
          [[ -f "$WIN_SIG_FILE" ]] || { echo "ERROR: missing $WIN_SIG_FILE" >&2; exit 1; }

          MAC_SIG=$(cat "$MAC_SIG_FILE")
          WIN_SIG=$(cat "$WIN_SIG_FILE")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_sig "$MAC_SIG" \
            --arg win_sig "$WIN_SIG" \
            --arg repo "$REPO" \
            --arg tag "$TAG" \
            --arg version_bare "$VERSION" \
            '{
              version: $version,
              notes: "Gene App \($version)",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $mac_sig,
                  url: "https://github.com/\($repo)/releases/download/\($tag)/Gene.App_aarch64.app.tar.gz"
                },
                "windows-x86_64": {
                  signature: $win_sig,
                  url: "https://github.com/\($repo)/releases/download/\($tag)/Gene.App_\($version_bare)_x64-setup.nsis.zip"
                }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json
          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
